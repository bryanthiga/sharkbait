<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sharkbait — Shark sightings near you</title>
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sharkbait">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="description" content="Track shark sightings worldwide in real time. See attacks, warnings, and encounters on a live map with species identification.">
  <meta property="og:title" content="Sharkbait — Live Shark Tracker">
  <meta property="og:description" content="Track shark sightings worldwide in real time. See attacks, warnings, and encounters on a live map.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/shark-mascot.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Sharkbait — Live Shark Tracker">
  <meta name="twitter:description" content="Track shark sightings worldwide in real time.">
  <link rel="dns-prefetch" href="https://api.mapbox.com">
  <link rel="preconnect" href="https://api.mapbox.com" crossorigin>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.2/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.2/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #020617;
      color: #f1f5f9;
      height: 100dvh;
      overflow: hidden;
    }

    .app { display: flex; flex-direction: column; height: 100dvh; }
    @media (min-width: 768px) { .app { flex-direction: row; } }

    /* ── Map ───────────────────────────────────────── */
    .map-wrap { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    .logo {
      position: absolute; top: 14px; left: 14px; z-index: 5;
      display: flex; align-items: center; gap: 10px;
      background: rgba(2,6,23,0.75); backdrop-filter: blur(20px);
      padding: 6px 18px 6px 6px; border-radius: 20px;
      border: 1px solid rgba(45,212,191,0.2);
      box-shadow: 0 6px 32px rgba(0,0,0,0.5), 0 0 20px rgba(45,212,191,0.08);
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
    }
    .logo:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 30px rgba(45,212,191,0.15);
    }
    .logo:active { transform: scale(0.96); }
    .logo-shark {
      width: 44px; height: 44px; border-radius: 14px; object-fit: cover;
      animation: bob 3s ease-in-out infinite;
      filter: drop-shadow(0 2px 6px rgba(45,212,191,0.3));
    }
    .logo-text { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.02em; }
    .logo-text span {
      background: linear-gradient(135deg, #5eead4 0%, #2dd4bf 50%, #14b8a6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-tagline {
      font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 0.06em;
      font-weight: 500; margin-top: -2px;
    }

    /* ── Mapbox zoom: below the logo, away from hamburger ─── */
    .mapboxgl-ctrl-top-left {
      top: 78px !important;
      left: 14px !important;
    }
    .mapboxgl-ctrl-top-left .mapboxgl-ctrl {
      background: rgba(2,6,23,0.75) !important;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(45,212,191,0.2);
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .mapboxgl-ctrl-top-left .mapboxgl-ctrl button {
      background-color: transparent !important;
      filter: invert(1) hue-rotate(180deg);
    }
    @media (max-width: 767px) {
      .mapboxgl-ctrl-top-left { top: 70px !important; left: 12px !important; }
      /* On mobile the bottom sheet covers the lower half — anchor a bit
         above center so the pill sits in the visible map area. */
      .loading-overlay { top: 38%; padding: 10px 18px; }
      .loading-text { font-size: 12px; }
    }

    /* ── Hamburger / Account drawer ────────────────── */
    .menu-btn {
      position: absolute; top: 14px; right: 14px; z-index: 40;
      width: 44px; height: 44px; border-radius: 14px;
      background: rgba(2,6,23,0.75); backdrop-filter: blur(20px);
      border: 1px solid rgba(45,212,191,0.2);
      box-shadow: 0 6px 32px rgba(0,0,0,0.5), 0 0 20px rgba(45,212,191,0.08);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    }
    .menu-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 30px rgba(45,212,191,0.15);
    }
    .menu-btn:active { transform: scale(0.94); }
    .menu-btn span {
      display: block; width: 18px; height: 2px; border-radius: 2px;
      background: #5eead4; position: relative;
      transition: transform 0.3s, opacity 0.2s, top 0.3s;
    }
    .menu-btn span::before, .menu-btn span::after {
      content: ""; position: absolute; left: 0; width: 18px; height: 2px;
      border-radius: 2px; background: #5eead4;
      transition: transform 0.3s, top 0.3s;
    }
    .menu-btn span::before { top: -6px; }
    .menu-btn span::after  { top:  6px; }
    .menu-btn.open span { background: transparent; }
    .menu-btn.open span::before { top: 0; transform: rotate(45deg); }
    .menu-btn.open span::after  { top: 0; transform: rotate(-45deg); }

    .drawer-backdrop {
      position: fixed; inset: 0; z-index: 45;
      background: rgba(2,6,23,0.55); backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 50;
      width: min(380px, 92vw);
      background: rgba(2,6,23,0.98); backdrop-filter: blur(24px);
      border-left: 1px solid rgba(45,212,191,0.15);
      box-shadow: -12px 0 48px rgba(0,0,0,0.6);
      transform: translateX(100%);
      transition: transform 0.42s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex; flex-direction: column;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 20px 22px 12px; flex-shrink: 0;
    }
    .drawer-title {
      font-size: 22px; font-weight: 800; color: #fff;
      letter-spacing: -0.01em; margin-bottom: 4px;
    }
    .drawer-subtitle {
      font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.4;
    }

    .drawer-tabs {
      display: flex; padding: 0 22px; gap: 6px; margin-bottom: 6px;
    }
    .drawer-tab {
      flex: 1; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(45,212,191,0.12);
      color: rgba(255,255,255,0.55);
      padding: 9px 8px; font-size: 12px; font-weight: 600;
      border-radius: 10px; cursor: pointer; font-family: inherit;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .drawer-tab:hover { color: #fff; }
    .drawer-tab.active {
      background: rgba(45,212,191,0.12); color: #5eead4;
      border-color: rgba(45,212,191,0.4);
    }

    .drawer-link {
      background: none; border: none; color: rgba(94,234,212,0.7);
      font-size: 12px; cursor: pointer; padding: 4px 0; font-family: inherit;
      align-self: center;
    }
    .drawer-link:hover { color: #5eead4; text-decoration: underline; }

    .drawer-form {
      padding: 6px 22px 22px; display: flex; flex-direction: column; gap: 14px;
    }
    .drawer-field { display: flex; flex-direction: column; gap: 6px; }
    .drawer-field label {
      font-size: 11px; font-weight: 600; color: #5eead4;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .drawer-field input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(45,212,191,0.18);
      border-radius: 12px; padding: 12px 14px;
      color: #fff; font-size: 14px; font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none; appearance: none;
    }
    .drawer-field input:focus {
      outline: none; border-color: #2dd4bf;
      background: rgba(45,212,191,0.06);
    }
    .drawer-field input::placeholder { color: rgba(255,255,255,0.3); }

    .drawer-submit {
      margin-top: 6px; padding: 14px;
      background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
      color: #022c22; font-weight: 700; font-size: 14px;
      border: none; border-radius: 14px; cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .drawer-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(45,212,191,0.25); }
    .drawer-submit:active { transform: translateY(0); }
    .drawer-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .drawer-note {
      font-size: 11px; color: rgba(255,255,255,0.45); line-height: 1.5;
      text-align: center; padding: 0 8px;
    }

    .drawer-account {
      padding: 14px 22px;
      border-top: 1px solid rgba(45,212,191,0.1);
      margin-top: auto;
      font-size: 12px; color: rgba(255,255,255,0.6);
    }
    .drawer-account strong { color: #5eead4; }
    .drawer-signout {
      margin-top: 8px; background: none; border: none;
      color: #f87171; font-size: 12px; cursor: pointer; padding: 0;
      font-family: inherit;
    }
    .drawer-signout:hover { text-decoration: underline; }

    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 24px);
      background: rgba(2,6,23,0.95); backdrop-filter: blur(20px);
      color: #fff; padding: 12px 20px; border-radius: 999px;
      border: 1px solid rgba(45,212,191,0.3); z-index: 60;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 767px) {
      .menu-btn { top: 12px; right: 12px; }
      .drawer { width: 100vw; max-width: 420px; }
    }

    /* ── Loading: centered pill that does NOT block the map ─ */
    .loading-overlay {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 22px; border-radius: 999px;
      z-index: 10; pointer-events: none;
      background: rgba(2,6,23,0.85); backdrop-filter: blur(18px);
      border: 1px solid rgba(45,212,191,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex; flex-direction: row; align-items: center; gap: 10px;
      background: rgba(2,6,23,0.6); backdrop-filter: blur(4px);
      pointer-events: none; transition: opacity 0.6s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-shark-wrap {
      width: 24px; height: 16px; position: relative;
      animation: swimLoading 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }
    .loading-shark-wrap svg { width: 100%; height: 100%; fill: #2dd4bf; filter: drop-shadow(0 0 6px rgba(45,212,191,0.5)); }
    .loading-text { margin-top: 0; font-size: 12px; color: #cbd5e1; letter-spacing: 0.01em; font-weight: 500; }
    .loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }

    @keyframes swimLoading {
      0%, 100% { transform: translateX(-20px) rotate(-3deg); }
      50% { transform: translateX(20px) rotate(3deg); }
    }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

    /* ── Resize Handle (desktop only) ──────────────── */
    .resize-handle {
      display: none; /* hidden on mobile */
    }
    @media (min-width: 768px) {
      .resize-handle {
        display: flex; position: relative; z-index: 20;
        width: 8px; height: 100%; cursor: col-resize;
        background: rgba(45,212,191,0.06);
        align-items: center; justify-content: center;
        transition: background 0.2s;
        flex-shrink: 0;
        border-left: 1px solid rgba(45,212,191,0.1);
        border-right: 1px solid rgba(45,212,191,0.1);
        touch-action: none;
      }
      .resize-handle:hover, .resize-handle.active { background: rgba(45,212,191,0.15); }
      .resize-handle .grip {
        width: 4px; height: 40px; border-radius: 99px;
        background: rgba(45,212,191,0.4);
        transition: background 0.2s, transform 0.2s;
      }
      .resize-handle:hover .grip, .resize-handle.active .grip {
        background: #2dd4bf; transform: scale(1.2);
      }
    }

    body.resizing { cursor: col-resize; user-select: none; }
    body.resizing .map-wrap, body.resizing .sidebar { pointer-events: none; transition: none; }

    /* ── Sidebar ───────────────────────────────────── */
    .sidebar {
      display: flex; flex-direction: column;
      background: rgba(2,6,23,0.97); backdrop-filter: blur(24px);
      overflow: hidden;
    }

    /* ── Mobile bottom sheet ───────────────────────── */
    @media (max-width: 767px) {
      /* Map fills the full screen */
      .map-wrap { height: 100dvh; flex: none; }
      /* App is block so map takes full space */
      .app { display: block; position: relative; }

      .sidebar {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 91dvh; /* max when fully open */
        max-height: none; min-height: 0;
        border-radius: 22px 22px 0 0;
        border-top: 1px solid rgba(45,212,191,0.15);
        box-shadow: 0 -12px 48px rgba(0,0,0,0.7), 0 -1px 0 rgba(45,212,191,0.08);
        z-index: 30;
        transform: translateY(var(--sheet-translate, 0px));
        will-change: transform;
        /* default: peek (set by JS on load) */
        touch-action: none;
        overscroll-behavior: contain;
      }
      .sidebar.sheet-snap {
        transition: transform 0.42s cubic-bezier(0.32, 0.72, 0, 1);
      }

      /* Sheet drag handle pill */
      .sheet-handle {
        display: flex; align-items: center; justify-content: center;
        padding: 10px 0 4px; flex-shrink: 0; cursor: grab;
        user-select: none; -webkit-user-select: none;
      }
      .sheet-handle-pill {
        width: 36px; height: 4px; border-radius: 99px;
        background: rgba(255,255,255,0.18);
        transition: background 0.2s, width 0.2s;
      }
      .sidebar.sheet-dragging .sheet-handle-pill {
        background: #2dd4bf; width: 48px;
      }

      /* Stats: slightly more compact on mobile */
      .stats { padding: 8px 10px; gap: 6px; }
      .stat { padding: 9px 4px 7px; border-radius: 14px; }
      .stat-num { font-size: 20px; }
      .stat-icon { font-size: 17px; }
      .stat-label { font-size: 7px; }

      /* Species bar: only visible when sheet is half/full */
      .species-section {
        max-height: 0; overflow: hidden; padding: 0 12px;
        transition: max-height 0.3s ease, padding 0.3s ease;
      }
      .sidebar.sheet-half .species-section,
      .sidebar.sheet-full .species-section {
        max-height: 120px; padding: 4px 12px 8px;
      }

      /* Bigger touch targets on filter/time pills */
      .filter-btn { padding: 10px 14px; font-size: 12px; min-height: 40px; }
      .time-pill { padding: 10px 16px; font-size: 12px; min-height: 40px; }
      .filters { padding: 6px 10px; gap: 6px; }
      .time-range { padding: 6px 10px; }

      /* Cards: more readable on mobile */
      .card { padding: 13px 14px; margin-bottom: 8px; border-radius: 16px; }
      .card-title { font-size: 13.5px; -webkit-line-clamp: 3; }
      .card-location { font-size: 12px; margin-top: 6px; }
      .card-meta { font-size: 11px; margin-top: 6px; }
      .card-meta a { font-size: 12px; }
      .badge { font-size: 9px; padding: 4px 9px; }

      /* Feed: more padding so last card isn't behind home indicator.
         touch-action: pan-y lets the feed scroll natively even though
         the parent .sidebar has touch-action: none for sheet dragging. */
      .feed { padding: 8px 10px 24px; touch-action: pan-y; }

      /* Refresh bar */
      .refresh-bar { padding: 6px 12px 10px; }
      .refresh-btn { padding: 13px; font-size: 13px; border-radius: 16px; }
    }

    /* Desktop sidebar */
    @media (min-width: 768px) {
      .sidebar { max-height: none; width: 400px; min-width: 260px; max-width: 65vw; min-height: 0; }
      .sheet-handle { display: none; }
    }

    .sidebar > .stats,
    .sidebar > .species-section,
    .sidebar > .filters,
    .sidebar > .refresh-bar { flex-shrink: 0; }

    /* ── Stats ─────────────────────────────────────── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; }

    .stat {
      border-radius: 16px; padding: 10px 6px 8px; text-align: center;
      position: relative; overflow: hidden; cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
      border: 1px solid var(--stat-glow, rgba(255,255,255,0.06));
    }
    .stat:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 8px 24px var(--stat-shadow, rgba(0,0,0,0.4));
      border-color: var(--stat-glow, rgba(255,255,255,0.1));
    }
    .stat:active { transform: translateY(-1px) scale(0.97); }

    /* Shimmer sweep */
    .stat::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shimmer 3s ease-in-out infinite;
      pointer-events: none;
    }
    .stat:nth-child(2)::after { animation-delay: 0.4s; }
    .stat:nth-child(3)::after { animation-delay: 0.8s; }
    .stat:nth-child(4)::after { animation-delay: 1.2s; }

    .stat-icon {
      font-size: 20px; line-height: 1;
      margin-bottom: 2px;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      display: inline-block;
    }
    .stat:hover .stat-icon { transform: scale(1.3) rotate(-8deg); }

    .stat-num {
      font-size: 24px; font-weight: 900;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, #fff 40%, var(--stat-color, #94a3b8));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 6px var(--stat-shadow, transparent));
    }
    .stat-label {
      font-size: 8px; text-transform: uppercase; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.45); margin-top: 1px; font-weight: 600;
    }

    /* Per-type theming */
    .stat-total {
      background: linear-gradient(145deg, #0a1628 0%, #155e75 100%);
      --stat-color: #67e8f9; --stat-glow: rgba(34,211,238,0.2); --stat-shadow: rgba(34,211,238,0.15);
    }
    .stat-attack {
      background: linear-gradient(145deg, #2a0a14 0%, #dc2626 100%);
      --stat-color: #fca5a5; --stat-glow: rgba(239,68,68,0.25); --stat-shadow: rgba(239,68,68,0.2);
    }
    .stat-warning {
      background: linear-gradient(145deg, #2a1500 0%, #d97706 100%);
      --stat-color: #fde68a; --stat-glow: rgba(245,158,11,0.25); --stat-shadow: rgba(245,158,11,0.2);
    }
    .stat-sighting {
      background: linear-gradient(145deg, #022c22 0%, #059669 100%);
      --stat-color: #a7f3d0; --stat-glow: rgba(16,185,129,0.25); --stat-shadow: rgba(16,185,129,0.2);
    }

    @keyframes shimmer {
      0% { left: -100%; }
      50%, 100% { left: 150%; }
    }

    /* ── Species Bar ───────────────────────────────── */
    .species-section {
      padding: 4px 12px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .species-header {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35); margin-bottom: 6px; font-weight: 600;
    }
    .species-bar {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .species-bar::-webkit-scrollbar { display: none; }

    .species-item {
      display: flex; flex-direction: column; align-items: center;
      min-width: 68px; cursor: pointer;
      padding: 6px 4px; border-radius: 14px;
      transition: all 0.25s ease;
      border: 1px solid transparent;
      position: relative;
    }
    .species-item:hover { background: rgba(45,212,191,0.06); }
    .species-item.active {
      background: rgba(45,212,191,0.1);
      border-color: rgba(45,212,191,0.25);
      box-shadow: 0 0 20px rgba(45,212,191,0.1);
    }

    .species-icon {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px; overflow: hidden;
      background: rgba(255,255,255,0.03);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    }
    .species-item.active .species-icon {
      box-shadow: 0 0 16px rgba(45,212,191,0.3);
      background: rgba(45,212,191,0.08);
    }
    .species-item:hover .species-icon { transform: scale(1.1); }
    .species-icon img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
      filter: grayscale(0.3) brightness(0.85);
      transition: filter 0.25s;
    }
    .species-item.active .species-icon img,
    .species-item:hover .species-icon img {
      filter: grayscale(0) brightness(1);
      animation: bob 2.5s ease-in-out infinite;
    }
    .species-icon svg { width: 100%; height: 100%; fill: currentColor; color: #64748b; }
    .species-item.active .species-icon svg { color: #2dd4bf; animation: swim 2.5s ease-in-out infinite; }

    .species-label {
      font-size: 9px; color: #64748b; text-align: center;
      white-space: nowrap; margin-top: 2px;
      transition: color 0.25s;
    }
    .species-item.active .species-label { color: #5eead4; }

    .species-count {
      position: absolute; top: 2px; right: 4px;
      font-size: 8px; font-weight: 700; color: #fff;
      background: rgba(45,212,191,0.6); border-radius: 99px;
      min-width: 16px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }

    /* ── Time Range Toggle ────────────────────────── */
    .time-range {
      display: flex; gap: 0; padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      justify-content: center;
    }
    .time-pill {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: #64748b; font-size: 11px; font-weight: 600;
      padding: 6px 18px; cursor: pointer;
      transition: all 0.25s ease; letter-spacing: 0.02em;
    }
    .time-pill:first-child { border-radius: 99px 0 0 99px; }
    .time-pill:last-child { border-radius: 0 99px 99px 0; }
    .time-pill:not(:first-child) { border-left: none; }
    .time-pill:hover { color: #cbd5e1; background: rgba(255,255,255,0.06); }
    .time-pill.active {
      background: linear-gradient(135deg, rgba(13,148,136,0.25), rgba(6,95,70,0.25));
      color: #5eead4;
      border-color: rgba(45,212,191,0.3);
      box-shadow: 0 0 12px rgba(45,212,191,0.1);
    }

    /* ── Filters ───────────────────────────────────── */
    .filters {
      display: flex; gap: 6px; padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .filter-btn {
      background: none; border: 1px solid transparent;
      color: #64748b; font-size: 11px; font-weight: 500;
      padding: 5px 12px; border-radius: 99px;
      cursor: pointer; transition: all 0.2s ease;
      white-space: nowrap;
    }
    .filter-btn:hover { color: #cbd5e1; background: rgba(255,255,255,0.04); }
    .filter-btn.active {
      background: rgba(45,212,191,0.12); color: #5eead4;
      border-color: rgba(45,212,191,0.25);
      box-shadow: 0 0 12px rgba(45,212,191,0.08);
    }

    /* ── Feed ──────────────────────────────────────── */
    .feed {
      flex: 1; min-height: 0; overflow-y: auto; padding: 8px 10px;
      -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
    }
    .feed::-webkit-scrollbar { width: 3px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: rgba(45,212,191,0.15); border-radius: 4px; }

    .card {
      background: rgba(15,39,68,0.35);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 14px; padding: 10px 12px; margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.25s ease;
      opacity: 0; animation: cardEnter 0.4s ease forwards;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
      background: var(--card-accent, #3b82f6); border-radius: 3px 0 0 3px;
      opacity: 0; transition: opacity 0.2s;
    }
    .card:hover { background: rgba(15,39,68,0.6); transform: translateX(4px); }
    .card:hover::before { opacity: 1; }
    .card.active {
      background: rgba(22,78,99,0.5);
      border-color: rgba(45,212,191,0.2);
      transform: translateX(4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .card.active::before { opacity: 1; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title {
      font-size: 13px; font-weight: 500; color: #e2e8f0; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .badge {
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 3px 8px; border-radius: 99px; white-space: nowrap;
      border: 1px solid; flex-shrink: 0;
    }
    .badge-attack { background: rgba(239,68,68,0.15); color: #fca5a5; border-color: rgba(239,68,68,0.3); }
    .badge-warning { background: rgba(245,158,11,0.12); color: #fde68a; border-color: rgba(245,158,11,0.25); }
    .badge-sighting { background: rgba(16,185,129,0.1); color: #a7f3d0; border-color: rgba(16,185,129,0.2); }
    .badge-unknown { background: rgba(59,130,246,0.1); color: #bfdbfe; border-color: rgba(59,130,246,0.2); }

    .health-dot {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 8px; font-weight: 700; letter-spacing: 0.05em;
      padding: 2px 7px; border-radius: 99px; white-space: nowrap; flex-shrink: 0;
    }
    .health-dot::before { content: ''; width: 5px; height: 5px; border-radius: 50%; display: inline-block; background: currentColor; }
    .health-verified { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .health-unconfirmed { background: rgba(245,158,11,0.1); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
    .health-low { background: rgba(239,68,68,0.08); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

    .card-species {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; color: #5eead4; margin-top: 4px;
      background: rgba(45,212,191,0.08); padding: 2px 8px 2px 3px;
      border-radius: 99px; width: fit-content;
    }
    .card-species img { width: 20px; height: 20px; border-radius: 6px; object-fit: cover; }
    .card-species svg { width: 18px; height: 12px; fill: currentColor; }

    .card-location { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .card-meta {
      font-size: 10px; color: #475569; margin-top: 5px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-meta a {
      color: #2dd4bf; text-decoration: none; font-weight: 600;
      transition: color 0.15s;
    }
    .card-meta a:hover { color: #5eead4; }

    .refresh-bar { padding: 8px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .refresh-btn {
      width: 100%; padding: 11px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, rgba(13,148,136,0.6), rgba(6,95,70,0.6));
      color: #fff; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      border: 1px solid rgba(45,212,191,0.15);
    }
    .refresh-btn:hover { background: linear-gradient(135deg, rgba(13,148,136,0.8), rgba(6,95,70,0.8)); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(13,148,136,0.2); }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .empty { padding: 60px 20px; text-align: center; font-size: 13px; color: #475569; }


    /* ── Animations ────────────────────────────────── */
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes swim {
      0%, 100% { transform: translateX(0) scaleX(1) rotate(0deg); }
      25% { transform: translateX(3px) scaleX(1) rotate(2deg); }
      75% { transform: translateX(-3px) scaleX(1) rotate(-2deg); }
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateX(16px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.5; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="map-wrap">
      <div id="map"></div>
      <div class="logo" onclick="map.flyTo({center:[-128,37],zoom:3.5,duration:1500})">
        <img class="logo-shark" src="/shark-mascot.png" alt="Sharkbait mascot">
        <div>
          <div class="logo-text"><span>Sharkbait</span></div>
          <div class="logo-tagline">Live shark tracker</div>
        </div>
      </div>
      <div class="loading-overlay" id="loading">
        <div class="loading-shark-wrap">
          <svg viewBox="0 0 64 36"><path d="M4,20 C8,14 16,12 22,14 L26,6 L30,14 C38,10 52,14 58,18 L60,14 L58,20 L62,22 C48,28 24,26 14,23 C9,22 5,22 4,20Z"/><circle cx="18" cy="16" r="1.5" fill="#020617"/></svg>
        </div>
        <div class="loading-text">Scanning for shark sightings<span class="loading-dots"></span></div>
      </div>
    </div>

    <div class="resize-handle" id="resize-handle"><div class="grip"></div></div>
    <div class="sidebar" id="sidebar">
      <div class="sheet-handle" id="sheet-handle"><div class="sheet-handle-pill"></div></div>
      <div class="stats">
        <div class="stat stat-total" data-filter="All"><div class="stat-icon">🦈</div><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
        <div class="stat stat-attack" data-filter="Attack"><div class="stat-icon">🩸</div><div class="stat-num" id="stat-attack">0</div><div class="stat-label">Attacks</div></div>
        <div class="stat stat-warning" data-filter="Warning"><div class="stat-icon">⚠️</div><div class="stat-num" id="stat-warning">0</div><div class="stat-label">Warnings</div></div>
        <div class="stat stat-sighting" data-filter="Sighting"><div class="stat-icon">👁️</div><div class="stat-num" id="stat-sighting">0</div><div class="stat-label">Sightings</div></div>
      </div>

      <div class="species-section">
        <div class="species-header">Species Spotted</div>
        <div class="species-bar" id="species-bar"></div>
      </div>

      <div class="time-range" id="time-range">
        <button class="time-pill active" data-range="all">All Time</button>
        <button class="time-pill" data-range="today">Today</button>
        <button class="time-pill" data-range="7d">7 Day</button>
        <button class="time-pill" data-range="30d">Monthly</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="All">All</button>
        <button class="filter-btn" data-filter="Attack">🔴 Attacks</button>
        <button class="filter-btn" data-filter="Warning">🟠 Warnings</button>
        <button class="filter-btn" data-filter="Sighting">🟢 Sightings</button>
      </div>

      <div class="feed" id="feed"></div>

      <div class="refresh-bar">
        <div id="last-refreshed" style="text-align:center;font-size:10px;color:#475569;margin-bottom:5px;"></div>
        <button class="refresh-btn" id="refresh-btn" disabled>Scanning…</button>
      </div>
    </div>
  </div>

  <!-- Hamburger button (top-right, mobile + desktop) -->
  <button class="menu-btn" id="menu-btn" aria-label="Open menu" aria-expanded="false">
    <span></span>
  </button>

  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-header">
      <div class="drawer-title" id="drawer-title">Sign in to Sharkbait</div>
      <div class="drawer-subtitle" id="drawer-subtitle">
        Save your favorite sightings and get notified when sharks are spotted near you.
      </div>
    </div>

    <div class="drawer-tabs" id="drawer-tabs">
      <button class="drawer-tab active" data-mode="signin" type="button">Sign in</button>
      <button class="drawer-tab"        data-mode="signup" type="button">Create account</button>
    </div>

    <form class="drawer-form" id="auth-form" autocomplete="on" novalidate>
      <div class="drawer-field" id="field-username" hidden>
        <label for="su-username">Username</label>
        <input id="su-username" type="text" name="username" placeholder="finchaser" autocomplete="username" maxlength="32">
      </div>
      <div class="drawer-field">
        <label for="su-email">Email</label>
        <input id="su-email" type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="drawer-field">
        <label for="su-password">Password</label>
        <input id="su-password" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required minlength="8">
      </div>
      <button class="drawer-submit" type="submit" id="auth-submit">Sign in</button>
      <button type="button" class="drawer-link" id="forgot-link">Forgot password?</button>
    </form>

    <div class="drawer-account" id="drawer-account" hidden>
      Signed in as <strong id="drawer-account-name"></strong>
      <br><span style="color:rgba(255,255,255,0.4);font-size:11px;" id="drawer-account-email"></span>
      <br><button type="button" class="drawer-signout" id="drawer-signout">Sign out</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script>
    function escapeHtml(str) {
      if (str == null) return "";
      var d = document.createElement("div");
      d.textContent = String(str);
      return d.innerHTML;
    }

    function safeUrl(url) {
      try {
        var u = new URL(url);
        if (u.protocol === "http:" || u.protocol === "https:") return encodeURI(url);
      } catch(e) {}
      return "#";
    }

    var TOKEN = "pk.eyJ1IjoiYnJ5YW50aGlnYSIsImEiOiJjbW5qaG1weGQwcTNkMnBwdXI1cTBkcTNhIn0.c96PKbqgeFGd_4NbW-w9PA";
    var TYPE_COLORS = { Attack: "#ef4444", Warning: "#f59e0b", Sighting: "#10b981", Unknown: "#3b82f6" };

    var allSightings = [];
    var currentFilter = "All";
    var currentSpecies = "All";
    var currentTimeRange = "all";
    var selectedId = null;
    var activePopup = null;
    var mapLoaded = false;

    // ── Shark 3D images by species ──────────────
    var SHARK_IMAGES = {
      "All": "/shark-mascot.png",
      "Great White": "/shark-great-white.png",
      "Tiger": "/shark-tiger.png",
      "Hammerhead": "/shark-hammerhead.png",
      "Bull": "/shark-bull.png",
      "Mako": "/shark-mako.png",
      "Whale Shark": "/shark-whale.png",
      "Blacktip": "/shark-blacktip.png",
      "Blue": "/shark-blue.png",
      "Nurse": "/shark-nurse.png",
      "Reef": "/shark-reef.png"
    };

    var SHARK_SVG_FALLBACK = '<svg viewBox="0 0 64 36"><path d="M4,20 C8,14 16,12 22,14 L26,6 L30,14 C38,10 52,14 58,18 L60,14 L58,20 L62,22 C48,28 24,26 14,23 C9,22 5,22 4,20Z" fill="currentColor"/><circle cx="18" cy="16" r="1.5" fill="#020617"/></svg>';

    function getSharkIcon(species) {
      var img = SHARK_IMAGES[species];
      if (img) return '<img src="' + img + '" alt="' + escapeHtml(species) + '">';
      return SHARK_SVG_FALLBACK;
    }

    // Species without a dedicated icon roll up under "Other"
    function bucketSpecies(species) {
      if (!species || species === "Unknown") return "Unknown";
      if (SHARK_IMAGES[species]) return species;
      return "Other";
    }

    function findSightingById(id) {
      var sid = String(id);
      return allSightings.find(function(s) { return String(s.id) === sid; });
    }

    // ── Map ──────────────────────────────────────
    mapboxgl.accessToken = TOKEN;
    var map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/satellite-streets-v12",
      center: [-128, 37],
      zoom: 3.5,
      projection: "globe"
    });
    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), "top-left");

    map.on("load", function() {
      mapLoaded = true;

      map.setFog({
        color: "rgb(10, 20, 40)",
        "high-color": "rgb(20, 40, 80)",
        "horizon-blend": 0.08,
        "space-color": "rgb(2, 6, 23)",
        "star-intensity": 0.4
      });

      map.addSource("sightings", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] }
      });

      map.addLayer({
        id: "sightings-glow",
        type: "circle",
        source: "sightings",
        paint: {
          "circle-radius": ["interpolate", ["linear"], ["zoom"], 1, 8, 6, 16, 12, 26],
          "circle-color": ["match", ["get", "type"], "Attack", "#ef4444", "Warning", "#f59e0b", "Sighting", "#10b981", "#3b82f6"],
          "circle-opacity": 0.2,
          "circle-blur": 1
        }
      });

      map.addLayer({
        id: "sightings-dots",
        type: "circle",
        source: "sightings",
        paint: {
          "circle-radius": ["interpolate", ["linear"], ["zoom"], 1, 5, 6, 8, 12, 14],
          "circle-color": ["match", ["get", "type"], "Attack", "#ef4444", "Warning", "#f59e0b", "Sighting", "#10b981", "#3b82f6"],
          "circle-stroke-width": 2.5,
          "circle-stroke-color": "#ffffff"
        }
      });

      function openMapPopupFromFeature(f) {
        if (!f || !f.geometry || f.geometry.type !== "Point") return;
        var props = f.properties || {};
        var coords = f.geometry.coordinates;
        var title = (props.title != null ? String(props.title) : "").substring(0, 80);
        var species = props.species != null ? String(props.species) : "";
        var location = props.location != null ? String(props.location) : "";
        var typ = props.type != null ? String(props.type) : "";
        var source = props.source != null ? String(props.source) : "";
        var url = props.url != null ? String(props.url) : "";
        if (activePopup) { activePopup.remove(); activePopup = null; }
        selectedId = props.id;
        updateFeed();
        var speciesHtml = species && species !== "Unknown"
          ? '<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#0d9488;background:rgba(13,148,136,0.1);padding:2px 7px;border-radius:99px;margin:4px 0;">' + escapeHtml(species) + '</span>'
          : '';
        activePopup = new mapboxgl.Popup({ offset: 12, closeButton: true, maxWidth: "280px" })
          .setLngLat(coords)
          .setHTML('<div style="font-family:system-ui;padding:4px 0;"><p style="margin:0 0 4px;font-weight:600;font-size:13px;color:#1a1a2e;">' + escapeHtml(title) + '</p>' + speciesHtml + '<p style="margin:4px 0 8px;font-size:11px;color:#555;">' + escapeHtml(location) + ' &middot; ' + escapeHtml(typ) + ' &middot; ' + escapeHtml(source) + '</p><a href="' + safeUrl(url) + '" target="_blank" rel="noopener" style="font-size:12px;color:#0d9488;font-weight:600;text-decoration:none;">Read article →</a></div>')
          .addTo(map);
      }

      map.on("click", function(e) {
        var features = map.queryRenderedFeatures(e.point, { layers: ["sightings-dots", "sightings-glow"] });
        if (!features.length) return;
        var top = features[0];
        openMapPopupFromFeature(top);
        window.dispatchEvent(new Event("sharkmap:select"));
      });

      map.on("mouseenter", "sightings-dots", function() { map.getCanvas().style.cursor = "pointer"; });
      map.on("mouseleave", "sightings-dots", function() { map.getCanvas().style.cursor = ""; });
      map.on("mouseenter", "sightings-glow", function() { map.getCanvas().style.cursor = "pointer"; });
      map.on("mouseleave", "sightings-glow", function() { map.getCanvas().style.cursor = ""; });

      if (allSightings.length > 0) render();
    });

    // ── Helpers ──────────────────────────────────
    function timeAgo(dateStr) {
      var ts = new Date(dateStr).getTime();
      if (isNaN(ts)) return "recently";
      var diff = Date.now() - ts;
      var mins = Math.floor(diff / 60000);
      if (mins < 0) return "just now";
      if (mins < 60) return mins + "m ago";
      var hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + "h ago";
      return Math.floor(hrs / 24) + "d ago";
    }

    function getTimeRangeCutoff() {
      var now = Date.now();
      if (currentTimeRange === "today") return now - 24 * 60 * 60 * 1000;
      if (currentTimeRange === "7d") return now - 7 * 24 * 60 * 60 * 1000;
      if (currentTimeRange === "30d") return now - 30 * 24 * 60 * 60 * 1000;
      return 0;
    }

    function getFiltered() {
      var s = allSightings;
      var cutoff = getTimeRangeCutoff();
      if (cutoff > 0) {
        s = s.filter(function(x) { return new Date(x.date).getTime() >= cutoff; });
      }
      if (currentFilter !== "All") {
        s = s.filter(function(x) { return x.type === currentFilter; });
      }
      if (currentSpecies !== "All") {
        s = s.filter(function(x) { return bucketSpecies(x.species) === currentSpecies; });
      }
      return s;
    }

    // ── Animated stat counter ────────────────────
    function animateCount(el, target) {
      var current = parseInt(el.textContent) || 0;
      if (current === target) return;
      var duration = 600;
      var start = performance.now();
      function step(ts) {
        var progress = Math.min((ts - start) / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(current + (target - current) * eased);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function updateStats() {
      var f = getFiltered();
      var counts = { Attack: 0, Warning: 0, Sighting: 0 };
      for (var i = 0; i < f.length; i++) {
        if (counts[f[i].type] !== undefined) counts[f[i].type]++;
      }
      animateCount(document.getElementById("stat-total"), f.length);
      animateCount(document.getElementById("stat-attack"), counts.Attack);
      animateCount(document.getElementById("stat-warning"), counts.Warning);
      animateCount(document.getElementById("stat-sighting"), counts.Sighting);
    }

    // ── Species Bar ─────────────────────────────
    function updateSpeciesBar() {
      var bar = document.getElementById("species-bar");
      var counts = {};
      var cutoff = getTimeRangeCutoff();
      var base = allSightings;
      if (cutoff > 0) {
        base = base.filter(function(x) { return new Date(x.date).getTime() >= cutoff; });
      }
      var filtered = currentFilter === "All"
        ? base
        : base.filter(function(s) { return s.type === currentFilter; });

      filtered.forEach(function(s) {
        var sp = bucketSpecies(s.species);
        counts[sp] = (counts[sp] || 0) + 1;
      });

      // Sort by count, but pin "Other" and "Unknown" to the end
      var speciesList = Object.keys(counts).sort(function(a, b) {
        var aLast = (a === "Other" || a === "Unknown") ? 1 : 0;
        var bLast = (b === "Other" || b === "Unknown") ? 1 : 0;
        if (aLast !== bLast) return aLast - bLast;
        return counts[b] - counts[a];
      });

      var html = '<div class="species-item' + (currentSpecies === "All" ? " active" : "") + '" data-species="All">';
      html += '<div class="species-icon">' + getSharkIcon("All") + '</div>';
      html += '<div class="species-label">All</div>';
      html += '<div class="species-count">' + filtered.length + '</div>';
      html += '</div>';

      for (var i = 0; i < speciesList.length; i++) {
        var sp = speciesList[i];
        html += '<div class="species-item' + (currentSpecies === sp ? " active" : "") + '" data-species="' + escapeHtml(sp) + '">';
        html += '<div class="species-icon">' + getSharkIcon(sp) + '</div>';
        html += '<div class="species-label">' + escapeHtml(sp) + '</div>';
        html += '<div class="species-count">' + counts[sp] + '</div>';
        html += '</div>';
      }

      bar.innerHTML = html;

      bar.querySelectorAll(".species-item").forEach(function(item) {
        item.addEventListener("click", function() {
          currentSpecies = this.getAttribute("data-species");
          render();
        });
      });
    }

    // ── Map Data ────────────────────────────────
    function updateMapData() {
      if (!mapLoaded) return;
      var sightings = getFiltered();
      var features = sightings.map(function(s) {
        return {
          type: "Feature",
          geometry: { type: "Point", coordinates: [s.lon, s.lat] },
          properties: {
            id: s.id,
            title: s.title,
            location: s.location,
            type: s.type,
            species: s.species || "Unknown",
            source: s.source,
            url: s.url || ""
          }
        };
      });
      var src = map.getSource("sightings");
      if (src) src.setData({ type: "FeatureCollection", features: features });
    }

    // ── Feed ─────────────────────────────────────
    function updateFeed() {
      var feed = document.getElementById("feed");
      var sightings = getFiltered();
      if (sightings.length === 0) {
        var rangeLabels = { all: "", today: " today", "7d": " this week", "30d": " this month" };
        feed.innerHTML = '<div class="empty">No sightings found' + (rangeLabels[currentTimeRange] || "") + '</div>';
        return;
      }
      var html = "";
      for (var i = 0; i < sightings.length; i++) {
        var s = sightings[i];
        var badgeClass = "badge-" + s.type.toLowerCase();
        var activeClass = String(s.id) === String(selectedId) ? " active" : "";
        var accent = TYPE_COLORS[s.type] || "#3b82f6";
        var delay = Math.min(i * 0.04, 0.8);

        html += '<div class="card' + activeClass + '" data-id="' + s.id + '" style="--card-accent:' + accent + ';animation-delay:' + delay + 's">';
        html += '<div class="card-header"><div class="card-title">' + escapeHtml(s.title) + '</div>';
        html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;">';
        html += '<span class="badge ' + badgeClass + '">' + escapeHtml(s.type) + '</span>';
        html += healthBadge(s.healthScore);
        html += '</div></div>';

        if (s.species && s.species !== "Unknown") {
          html += '<div class="card-species">' + getSharkIcon(s.species) + ' ' + escapeHtml(s.species) + '</div>';
        }

        html += '<div class="card-location">📍 ' + escapeHtml(s.location) + '</div>';
        html += '<div class="card-meta"><span>' + timeAgo(s.date) + '</span><span>' + escapeHtml(s.source) + '</span><a href="' + safeUrl(s.url) + '" target="_blank" rel="noopener">Read →</a></div>';
        html += '</div>';
      }
      feed.innerHTML = html;

      feed.querySelectorAll(".card").forEach(function(card) {
        card.addEventListener("click", function(e) {
          if (e.target.tagName === "A") return;
          selectSighting(this.getAttribute("data-id"));
        });
      });
    }

    function selectSighting(id) {
      if (activePopup) { activePopup.remove(); activePopup = null; }
      selectedId = selectedId != null && String(selectedId) === String(id) ? null : id;
      updateFeed();
      if (selectedId) {
        var s = findSightingById(selectedId);
        if (s) {
          map.flyTo({ center: [s.lon, s.lat], zoom: 8, duration: 1200 });
          var speciesHtml = s.species && s.species !== "Unknown"
            ? '<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#0d9488;background:rgba(13,148,136,0.1);padding:2px 7px;border-radius:99px;margin:2px 0;">' + escapeHtml(s.species) + '</span>'
            : '';
          activePopup = new mapboxgl.Popup({ offset: 12, closeButton: false, maxWidth: "260px" })
            .setLngLat([s.lon, s.lat])
            .setHTML('<div style="font-family:system-ui;padding:4px 0;"><p style="margin:0 0 4px;font-weight:600;font-size:13px;color:#1a1a2e;">' + escapeHtml(s.title.substring(0, 80)) + '</p>' + speciesHtml + '<p style="margin:4px 0;font-size:11px;color:#555;">' + escapeHtml(s.location) + ' &middot; ' + escapeHtml(s.type) + '</p></div>')
            .addTo(map);
        }
      }
    }

    function render() {
      updateStats();
      updateSpeciesBar();
      updateMapData();
      updateFeed();
    }

    // ── Filter buttons ──────────────────────────
    function setFilter(filter) {
      document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
      var match = document.querySelector('.filter-btn[data-filter="' + filter + '"]');
      if (match) match.classList.add("active");
      currentFilter = filter;
      currentSpecies = "All";
      render();
    }

    document.querySelectorAll(".filter-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        setFilter(this.getAttribute("data-filter"));
      });
    });

    document.querySelectorAll(".stat[data-filter]").forEach(function(stat) {
      stat.addEventListener("click", function() {
        setFilter(this.getAttribute("data-filter"));
      });
    });

    document.querySelectorAll(".time-pill").forEach(function(pill) {
      pill.addEventListener("click", function() {
        document.querySelectorAll(".time-pill").forEach(function(p) { p.classList.remove("active"); });
        this.classList.add("active");
        currentTimeRange = this.getAttribute("data-range");
        render();
      });
    });

    // ── Health score badge helper ─────────────────
    function healthBadge(score) {
      if (score == null) return "";
      var cls, label;
      if (score >= 65) { cls = "health-verified"; label = "Verified"; }
      else if (score >= 40) { cls = "health-unconfirmed"; label = "Unconfirmed"; }
      else { cls = "health-low"; label = "Low confidence"; }
      return '<span class="health-dot ' + cls + '" title="Credibility: ' + score + '/100">' + label + '</span>';
    }

    var lastFetchedAt = null;

    // ── Fetch ────────────────────────────────────
    function fetchSightings(silent) {
      var btn = document.getElementById("refresh-btn");
      btn.disabled = true;
      if (!silent) {
        btn.textContent = "Scanning…";
        document.getElementById("loading").classList.remove("hidden");
      }

      fetch("/api/sightings?t=" + Date.now())
        .then(function(r) {
          if (!r.ok) throw new Error("Server returned " + r.status);
          return r.json();
        })
        .then(function(data) {
          var rows = Array.isArray(data) ? data : (data.sightings || []);
          if (data.fetchedAt) lastFetchedAt = data.fetchedAt;
          allSightings = rows;
          render();
          updateLastRefreshed();
        })
        .catch(function(err) {
          console.error("Fetch failed:", err);
          if (!silent) {
            var feed = document.getElementById("feed");
            if (feed) feed.innerHTML = '<div class="empty">Failed to load sightings. Tap refresh to try again.</div>';
          }
        })
        .finally(function() {
          btn.disabled = false;
          btn.textContent = "🔄 Refresh sightings";
          if (!silent) document.getElementById("loading").classList.add("hidden");
        });
    }

    function updateLastRefreshed() {
      var el = document.getElementById("last-refreshed");
      if (!el) return;
      if (!lastFetchedAt) { el.textContent = ""; return; }
      var mins = Math.floor((Date.now() - new Date(lastFetchedAt).getTime()) / 60000);
      el.textContent = mins < 1 ? "Updated just now" : "Updated " + mins + "m ago";
    }

    // Auto-refresh every 5 minutes
    setInterval(function() { fetchSightings(true); updateLastRefreshed(); }, 5 * 60 * 1000);
    // Tick the "updated Xm ago" label every minute
    setInterval(updateLastRefreshed, 60 * 1000);

    document.getElementById("refresh-btn").addEventListener("click", function() { fetchSightings(false); });

    // ── Desktop: resizable sidebar ──────────────
    (function() {
      if (window.innerWidth < 768) return;
      var handle = document.getElementById("resize-handle");
      var sidebar = document.getElementById("sidebar");
      var dragging = false;
      handle.addEventListener("mousedown", function(e) {
        e.preventDefault(); dragging = true;
        handle.classList.add("active");
        document.body.classList.add("resizing");
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onEnd);
      });
      function onMove(e) {
        if (!dragging) return;
        var w = Math.max(260, Math.min(window.innerWidth - e.clientX, window.innerWidth * 0.65));
        sidebar.style.width = w + "px";
        map.resize();
      }
      function onEnd() {
        dragging = false; handle.classList.remove("active");
        document.body.classList.remove("resizing");
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onEnd);
        map.resize();
      }
      window.addEventListener("resize", function() { map.resize(); });
    })();

    // ── Mobile: bottom sheet ─────────────────────
    (function() {
      if (window.innerWidth >= 768) return;

      var sidebar = document.getElementById("sidebar");
      var handle  = document.getElementById("sheet-handle");
      var feed    = document.getElementById("feed");

      // Snap positions (px translate from bottom) — computed at runtime
      var PEEK_SHOW = 94;   // px of sheet visible in peek mode (handle + stats)
      var state = "peek";   // "peek" | "half" | "full"
      var startY = 0, startTY = 0, isDragging = false;
      var velY = 0, lastY = 0, lastT = 0;

      function sheetH() { return sidebar.offsetHeight; }
      function winH()   { return window.innerHeight; }

      function translateFor(s) {
        var h = sheetH();
        if (s === "full") return 0;
        if (s === "half") return h - Math.round(winH() * 0.52);
        return h - PEEK_SHOW; // peek
      }

      function applyTranslate(ty, animate) {
        sidebar.classList.toggle("sheet-snap", animate);
        sidebar.classList.remove("sheet-dragging");
        sidebar.style.setProperty("--sheet-translate", ty + "px");
        sidebar.style.transform = "translateY(" + ty + "px)";
      }

      function snapTo(s, animate) {
        state = s;
        sidebar.classList.remove("sheet-peek","sheet-half","sheet-full");
        sidebar.classList.add("sheet-" + s);
        applyTranslate(translateFor(s), animate);
      }

      // Init — start at peek after a brief delay so the DOM is ready
      requestAnimationFrame(function() {
        sidebar.style.transition = "none";
        snapTo("peek", false);
        requestAnimationFrame(function() { sidebar.style.transition = ""; });
      });

      // Drag logic — works on both handle AND the feed (when at top of scroll)
      function startDrag(clientY) {
        isDragging = true;
        startY = clientY; startTY = translateFor(state);
        velY = 0; lastY = clientY; lastT = Date.now();
        sidebar.classList.add("sheet-dragging");
        sidebar.classList.remove("sheet-snap");
      }

      function moveDrag(clientY) {
        if (!isDragging) return;
        var now = Date.now();
        var dt = Math.max(1, now - lastT);
        velY = (clientY - lastY) / dt;
        lastY = clientY; lastT = now;

        var ty = startTY + (clientY - startY);
        var max = sheetH() - PEEK_SHOW;
        ty = Math.max(0, Math.min(ty, max));
        sidebar.style.transform = "translateY(" + ty + "px)";
      }

      function endDrag() {
        if (!isDragging) return;
        isDragging = false;
        sidebar.classList.remove("sheet-dragging");

        var curTY  = translateFor(state) + (lastY - startY);
        var h      = sheetH();
        var peekTY = h - PEEK_SHOW;
        var halfTY = h - Math.round(winH() * 0.52);
        var fullTY = 0;

        // Use velocity to bias direction
        var THRESHOLD = 0.3; // px/ms
        var next;
        if (velY > THRESHOLD) {
          // flicking down
          next = state === "full" ? "half" : "peek";
        } else if (velY < -THRESHOLD) {
          // flicking up
          next = state === "peek" ? "half" : "full";
        } else {
          // snap to nearest
          var dists = [
            { s: "peek", d: Math.abs(curTY - peekTY) },
            { s: "half", d: Math.abs(curTY - halfTY) },
            { s: "full", d: Math.abs(curTY - fullTY) },
          ];
          dists.sort(function(a,b){ return a.d - b.d; });
          next = dists[0].s;
        }
        snapTo(next, true);
        map.resize();
      }

      // Touch on the sheet handle
      handle.addEventListener("touchstart", function(e) {
        startDrag(e.touches[0].clientY);
      }, { passive: true });

      // Also allow dragging from anywhere on the sidebar header area
      // (stats, filters) but NOT from inside the scrolling feed
      sidebar.addEventListener("touchstart", function(e) {
        if (feed.contains(e.target)) {
          // At "full" — let the feed scroll natively, don't hijack touches
          if (state === "full") return;
          // At half/peek — only let feed scroll if it's already scrolled
          if (feed.scrollTop > 2) return;
        }
        if (e.target.closest("button") || e.target.closest("a")) return;
        startDrag(e.touches[0].clientY);
      }, { passive: true });

      document.addEventListener("touchmove", function(e) {
        if (!isDragging) return;
        // Only prevent default if we're actually moving the sheet
        if (Math.abs(e.touches[0].clientY - startY) > 4) e.preventDefault();
        moveDrag(e.touches[0].clientY);
      }, { passive: false });

      document.addEventListener("touchend", function() { endDrag(); });

      // Tap the handle pill to cycle: peek → half → full → peek
      handle.addEventListener("click", function() {
        var next = state === "peek" ? "half" : state === "half" ? "full" : "peek";
        snapTo(next, true);
        map.resize();
      });

      // When a map pin is tapped: pull sheet to half so map is visible
      window.addEventListener("sharkmap:select", function() {
        if (state === "full") { snapTo("half", true); map.resize(); }
      });

      // Expand to half when a card is tapped from peek
      sidebar.addEventListener("click", function(e) {
        var card = e.target.closest(".card");
        if (card && state === "peek") { snapTo("half", true); map.resize(); }
      });

      window.addEventListener("resize", function() {
        snapTo(state, false);
        map.resize();
      });
    })();

    fetchSightings();

    // ── Hamburger drawer + Supabase auth ────────────────
    (function() {
      var SUPABASE_URL = "https://ixknullykihbxjlcmvog.supabase.co";
      var SUPABASE_PUBLISHABLE_KEY = "sb_publishable_aChhjIWW-XBzfK0F8UBmTA_81E6P76Q";

      // Wait for the Supabase UMD script to load
      if (typeof supabase === "undefined" || !supabase.createClient) {
        console.warn("[auth] Supabase JS not loaded; auth disabled");
        return;
      }
      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
      });

      var btn         = document.getElementById("menu-btn");
      var drawer      = document.getElementById("drawer");
      var backdrop    = document.getElementById("drawer-backdrop");
      var form        = document.getElementById("auth-form");
      var submit      = document.getElementById("auth-submit");
      var tabs        = document.querySelectorAll(".drawer-tab");
      var fieldUser   = document.getElementById("field-username");
      var inputUser   = document.getElementById("su-username");
      var inputEmail  = document.getElementById("su-email");
      var inputPwd    = document.getElementById("su-password");
      var titleEl     = document.getElementById("drawer-title");
      var subtitleEl  = document.getElementById("drawer-subtitle");
      var forgotLink  = document.getElementById("forgot-link");
      var accountBox  = document.getElementById("drawer-account");
      var accountName = document.getElementById("drawer-account-name");
      var accountMail = document.getElementById("drawer-account-email");
      var signoutBtn  = document.getElementById("drawer-signout");
      var toastEl     = document.getElementById("toast");
      var toastTimer  = null;
      var mode        = "signin";

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() { toastEl.classList.remove("show"); }, 4000);
      }

      function openDrawer()  {
        drawer.classList.add("open"); backdrop.classList.add("open");
        btn.classList.add("open");
        btn.setAttribute("aria-expanded", "true");
        drawer.setAttribute("aria-hidden", "false");
      }
      function closeDrawer() {
        drawer.classList.remove("open"); backdrop.classList.remove("open");
        btn.classList.remove("open");
        btn.setAttribute("aria-expanded", "false");
        drawer.setAttribute("aria-hidden", "true");
      }

      function setMode(next) {
        mode = next;
        tabs.forEach(function(t) {
          t.classList.toggle("active", t.getAttribute("data-mode") === next);
        });
        if (next === "signup") {
          titleEl.textContent = "Create your account";
          subtitleEl.textContent = "Save favorite sightings and get notified when sharks show up near you.";
          fieldUser.hidden = false;
          inputUser.required = true;
          inputPwd.setAttribute("autocomplete", "new-password");
          submit.textContent = "Create account";
          forgotLink.style.display = "none";
        } else {
          titleEl.textContent = "Sign in to Sharkbait";
          subtitleEl.textContent = "Welcome back.";
          fieldUser.hidden = true;
          inputUser.required = false;
          inputPwd.setAttribute("autocomplete", "current-password");
          submit.textContent = "Sign in";
          forgotLink.style.display = "";
        }
      }

      function renderSession(session) {
        if (session && session.user) {
          var u = session.user;
          var uname = (u.user_metadata && u.user_metadata.username) || u.email.split("@")[0];
          accountName.textContent = uname;
          accountMail.textContent = u.email;
          accountBox.hidden = false;
          form.style.display = "none";
          document.getElementById("drawer-tabs").style.display = "none";
          titleEl.textContent = "Your account";
          subtitleEl.textContent = "You're signed in.";
        } else {
          accountBox.hidden = true;
          form.style.display = "";
          document.getElementById("drawer-tabs").style.display = "";
          setMode(mode); // restore title/subtitle for current mode
        }
      }

      // Tab switching
      tabs.forEach(function(t) {
        t.addEventListener("click", function() { setMode(t.getAttribute("data-mode")); });
      });

      // Open / close drawer
      btn.addEventListener("click", function() {
        if (drawer.classList.contains("open")) closeDrawer(); else openDrawer();
      });
      backdrop.addEventListener("click", closeDrawer);
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && drawer.classList.contains("open")) closeDrawer();
      });

      // Form submit (sign in OR sign up)
      form.addEventListener("submit", async function(e) {
        e.preventDefault();
        var username = inputUser.value.trim();
        var email    = inputEmail.value.trim();
        var password = inputPwd.value;

        if (!/^\S+@\S+\.\S+$/.test(email)) { showToast("Enter a valid email"); return; }
        if (password.length < 8) { showToast("Password must be 8+ characters"); return; }
        if (mode === "signup" && username.length < 2) { showToast("Pick a username (2+ chars)"); return; }

        submit.disabled = true;
        submit.textContent = mode === "signup" ? "Creating…" : "Signing in…";

        try {
          if (mode === "signup") {
            var resUp = await sb.auth.signUp({
              email: email,
              password: password,
              options: { data: { username: username } },
            });
            if (resUp.error) throw resUp.error;
            if (resUp.data && resUp.data.user && !resUp.data.session) {
              showToast("Check your email to confirm your account.");
            } else {
              showToast("Welcome aboard, " + username + "!");
            }
            form.reset();
          } else {
            var resIn = await sb.auth.signInWithPassword({ email: email, password: password });
            if (resIn.error) throw resIn.error;
            showToast("Signed in.");
            form.reset();
          }
        } catch (err) {
          showToast(err && err.message ? err.message : "Something went wrong");
        } finally {
          submit.disabled = false;
          submit.textContent = mode === "signup" ? "Create account" : "Sign in";
        }
      });

      // Forgot password
      forgotLink.addEventListener("click", async function() {
        var email = inputEmail.value.trim();
        if (!/^\S+@\S+\.\S+$/.test(email)) {
          showToast("Enter your email above first");
          return;
        }
        try {
          var res = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin,
          });
          if (res.error) throw res.error;
          showToast("Password reset link sent to " + email);
        } catch (err) {
          showToast(err && err.message ? err.message : "Could not send reset email");
        }
      });

      // Sign out
      signoutBtn.addEventListener("click", async function() {
        try {
          await sb.auth.signOut();
          showToast("Signed out");
        } catch (err) {
          showToast("Sign out failed");
        }
      });

      // React to auth state changes (sign in, sign out, token refresh)
      sb.auth.onAuthStateChange(function(_event, session) {
        renderSession(session);
      });

      // Hydrate initial state
      sb.auth.getSession().then(function(res) {
        renderSession(res.data && res.data.session);
      });
      setMode("signin");
    })();

  </script>
