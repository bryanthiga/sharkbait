<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.2/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.2/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body, html, #map { width: 100%; height: 100%; background: #020617; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var TYPE_COLORS = {
      Attack: "#ef4444",
      Warning: "#f59e0b",
      Sighting: "#10b981",
      Unknown: "#3b82f6"
    };

    var map = null;
    var markers = {};

    function initMap(token) {
      if (map) return;
      mapboxgl.accessToken = token;
      map = new mapboxgl.Map({
        container: "map",
        style: "mapbox://styles/mapbox/dark-v11",
        center: [-40, 20],
        zoom: 2,
        projection: "mercator"
      });
      map.addControl(new mapboxgl.NavigationControl(), "top-right");
    }

    function updateMarkers(sightings) {
      if (!map) return;
      var ids = {};
      for (var i = 0; i < sightings.length; i++) { ids[sightings[i].id] = true; }
      for (var id in markers) {
        if (!ids[id]) { markers[id].remove(); delete markers[id]; }
      }
      for (var i = 0; i < sightings.length; i++) {
        var s = sightings[i];
        if (markers[s.id]) continue;
        var color = TYPE_COLORS[s.type] || TYPE_COLORS.Unknown;
        var el = document.createElement("div");
        el.style.cssText = "width:14px;height:14px;border-radius:50%;border:2px solid #fff;cursor:pointer;background:" + color + ";box-shadow:0 0 8px " + color + "88;";
        var popup = new mapboxgl.Popup({ offset: 12, closeButton: false, maxWidth: "260px" })
          .setHTML('<div style="font-family:system-ui;padding:4px 0;"><p style="margin:0 0 4px;font-weight:600;font-size:13px;color:#1a1a2e;">' + s.title.substring(0, 80) + '</p><p style="margin:0;font-size:11px;color:#555;">' + s.location + ' &middot; ' + s.type + ' &middot; ' + s.source + '</p></div>');
        var marker = new mapboxgl.Marker({ element: el }).setLngLat([s.lon, s.lat]).setPopup(popup).addTo(map);
        (function(sid) { el.addEventListener("click", function() { try { window.parent.postMessage({ type: "marker-click", id: sid }, "*"); } catch(e) {} }); })(s.id);
        markers[s.id] = marker;
      }
    }

    function flyTo(id, sightings) {
      if (!map) return;
      for (var i = 0; i < sightings.length; i++) {
        if (sightings[i].id === id) {
          map.flyTo({ center: [sightings[i].lon, sightings[i].lat], zoom: 8, duration: 1200 });
          if (markers[id]) markers[id].togglePopup();
          break;
        }
      }
    }

    // Listen for messages from parent iframe
    window.addEventListener("message", function(e) {
      var msg = e.data;
      if (!msg || !msg.type) return;
      if (msg.type === "init") initMap(msg.token);
      if (msg.type === "sightings") updateMarkers(msg.sightings);
      if (msg.type === "flyTo") flyTo(msg.id, msg.sightings);
    });

    // Auto-init: fetch token from the main app's API, or use inline
    // This makes the map work when opened directly (not in iframe)
    function autoInit() {
      // Try to get sightings and show them standalone
      initMap("pk.eyJ1IjoiYnJ5YW50aGlnYSIsImEiOiJjbW5qaG1weGQwcTNkMnBwdXI1cTBkcTNhIn0.c96PKbqgeFGd_4NbW-w9PA");
      fetch("/api/sightings").then(function(r) { return r.json(); }).then(function(data) {
        if (Array.isArray(data)) updateMarkers(data);
      }).catch(function() {});
    }

    // If we're in an iframe, tell parent we're ready. Otherwise auto-init.
    if (window.parent !== window) {
      window.parent.postMessage({ type: "map-ready" }, "*");
    } else {
      autoInit();
    }
  </script>
</body>
</html>
